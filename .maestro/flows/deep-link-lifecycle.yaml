appId: com.digitalnomade.todo
name: Password reset deep-link state
tags:
  - smoke
  - auth
  - deep-link
---
- launchApp:
    clearState: true
- openLink: "myapp://reset-password"
- extendedWaitUntil:
    visible:
      id: "reset-password-invalid-link-screen"
    timeout: 10000
- assertVisible: "This reset link is incomplete.*"
- tapOn:
    id: "reset-password-request-link-button"
- assertVisible:
    id: "forgot-password-screen"
- openLink: "myapp://check-email"
- extendedWaitUntil:
    visible:
      id: "check-email-screen"
    timeout: 10000
- assertVisible:
    id: "verification-email-input"
- assertVisible: "Enter your registration email to continue.*"
