appId: com.digitalnomade.todo
name: Request password reset against backend
tags:
  - requires-backend
  - auth
---
- launchApp:
    clearState: true
- tapOn:
    id: "login-forgot-password-link"
- assertVisible:
    id: "forgot-password-screen"
- tapOn:
    id: "forgot-password-email-input"
- inputText: "${TEST_EMAIL}"
- hideKeyboard
- tapOn:
    id: "forgot-password-submit-button"
- extendedWaitUntil:
    visible: "send it again"
    timeout: 20000
- assertVisible:
    id: "forgot-password-screen"
